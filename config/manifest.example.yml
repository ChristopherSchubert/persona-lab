#   platform-architect: { capacity: owns }    # cross-app contracts/ADRs
#   developer:          { capacity: writes }  # repo tier: instantiated per member repo
#   product-analyst:    { capacity: owns }    # repo tier: local queue per member repo
# oversight:
#   autonomy: conservative
#   visibility: minimal
