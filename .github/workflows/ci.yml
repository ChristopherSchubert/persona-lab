name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: bats test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run full test suite (including schema conformance)
        run: bats tests/
